<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity App</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation */
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        nav div {
            margin: 0 15px;
        }

        nav div:hover {
            text-decoration: underline;
        }

        .settings-nav {
            margin-left: auto;
        }

        /* Page Layout */
        .page {
            display: none;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .active {
            display: block;
        }

        /* Home Page & Auth Styling */
        .home-card {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 50px auto;
        }

        .home-card button, .auth-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }

        .auth-input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* Notes & Calendar Styling */
        #note-input { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; }
        .note-item { background: #fffde7; padding: 10px; margin: 10px 0; border-left: 5px solid #fbc02d; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: white; padding: 10px; border-radius: 8px; }
        .calendar-day { padding: 15px; border: 1px solid #eee; text-align: center; border-radius: 4px; }
        .today { background: var(--primary); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav>
        <div onclick="checkAccess('home')">Home</div>
        <div onclick="checkAccess('notes')">Notes</div>
        <div onclick="checkAccess('calendar')">Calendar</div>
        <div onclick="showPage('settings')" class="settings-nav">⚙️ Account</div>
    </nav>

    <!-- HOME PAGE -->
    <div id="home" class="page">
        <div class="home-card">
            <h1>Welcome back!</h1>
            <p>Ready to be productive today?</p>
            <button onclick="showPage('notes')">Go to Notes</button>
            <button onclick="showPage('calendar')">Open Calendar</button>
        </div>
    </div>

    <!-- NOTES PAGE -->
    <div id="notes" class="page">
        <h2>Note Taker</h2>
        <textarea id="note-input" placeholder="Type your note here..."></textarea>
        <button onclick="addNote()" class="auth-btn" style="background: #4caf50;">Save Note</button>
        <div id="notes-list"></div>
    </div>

    <!-- CALENDAR PAGE -->
    <div id="calendar" class="page">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">Prev</button>
            <h2 id="month-title">Month Year</h2>
            <button onclick="changeMonth(1)">Next</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
    </div>

    <!-- LOGIN / SETTINGS PAGE -->
    <div id="settings" class="page active">
        <div class="home-card">
            <div id="logged-out-view">
                <h2>Sign In / Sign Up</h2>
                <input type="text" id="username" class="auth-input" placeholder="Username">
                <input type="password" id="password" class="auth-input" placeholder="Password">
                <button onclick="handleAuth('login')" class="auth-btn">Log In</button>
                <button onclick="handleAuth('signup')" class="auth-btn" style="background: #4caf50;">Create Account</button>
            </div>
            
            <div id="logged-in-view" style="display:none;">
                <h2 id="welcome-user">Welcome!</h2>
                <button onclick="logout()" class="auth-btn" style="background: #ff5252;">Log Out</button>
                <hr>
                <h3>Mock Database</h3>
                <ul id="user-list" style="list-style: none; padding: 0; text-align: left; font-size: 0.9rem;"></ul>
            </div>
        </div>
    </div>

    <script>
        // 1. GLOBAL STATE
        let users = JSON.parse(localStorage.getItem('app_users')) || [];
        let currentUser = null;

        // 2. ACCESS CONTROL & NAVIGATION
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'calendar') renderCalendar();
            if(pageId === 'settings') renderUserList();
        }

        function checkAccess(pageId) {
            if (!currentUser) {
                alert("Please log in first!");
                showPage('settings');
            } else {
                showPage(pageId);
            }
        }

        // 3. AUTH LOGIC
        function handleAuth(type) {
            const userInp = document.getElementById('username');
            const passInp = document.getElementById('password');

            if (!userInp.value || !passInp.value) {
                alert("Fields cannot be empty.");
                return;
            }

            if (type === 'signup') {
                const existing = users.find(u => u.username === userInp.value);
                if (existing) return alert("User already exists!");
                
                users.push({ username: userInp.value, password: passInp.value });
                localStorage.setItem('app_users', JSON.stringify(users));
                alert("Account created! You can now log in.");
            } else {
                const found = users.find(u => u.username === userInp.value && u.password === passInp.value);
                if (found) {
                    currentUser = found;
                    updateAuthUI();
                    showPage('home');
                } else {
                    alert("Invalid username or password.");
                }
            }
            userInp.value = '';
            passInp.value = '';
        }

        function logout() {
            currentUser = null;
            updateAuthUI();
            showPage('settings');
        }

        function updateAuthUI() {
            const outView = document.getElementById('logged-out-view');
            const inView = document.getElementById('logged-in-view');
            if (currentUser) {
                outView.style.display = 'none';
                inView.style.display = 'block';
                document.getElementById('welcome-user').innerText = `Hello, ${currentUser.username}!`;
            } else {
                outView.style.display = 'block';
                inView.style.display = 'none';
            }
        }

        function renderUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = users.map(u => `<li>👤 ${u.username}</li>`).join('');
        }

        // 4. NOTES LOGIC
        let notes = JSON.parse(localStorage.getItem('my_notes')) || [];
        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = notes.map((note, index) => 
                `<div class="note-item"><span>${note}</span><button class="delete-btn" onclick="deleteNote(${index})">Delete</button></div>`
            ).join('');
        }
        function addNote() {
            const input = document.getElementById('note-input');
            if (input.value.trim()) {
                notes.push(input.value);
                localStorage.setItem('my_notes', JSON.stringify(notes));
                input.value = '';
                renderNotes();
            }
        }
        function deleteNote(index) {
            notes.splice(index, 1);
            localStorage.setItem('my_notes', JSON.stringify(notes));
            renderNotes();
        }

        // 5. CALENDAR LOGIC
        let currentDate = new Date();
        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const title = document.getElementById('month-title');
            grid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            title.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentDate);

            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                grid.innerHTML += `<div class="calendar-day" style="font-weight:bold; background:#eee;">${day}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const isToday = i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                grid.innerHTML += `<div class="calendar-day ${isToday ? 'today' : ''}">${i}</div>`;
            }
        }
        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        // Start Up
        renderNotes();
    </script>
</body>
</html>
