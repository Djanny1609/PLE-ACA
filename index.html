<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity App</title>
    <style>
        /* CSS: Styling the App */
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Navigation */
        nav { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-around; cursor: pointer; }
        nav div:hover { text-decoration: underline; }

        /* Page Layout */
        .page { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .active { display: block; }

        /* Home Page */
        .home-card { background: var(--white); padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
        .home-card button { background: var(--primary); color: white; border: none; padding: 10px 20px; margin: 10px; border-radius: 5px; cursor: pointer; font-size: 1rem; }

        /* Notes Page */
        #note-input { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .note-item { background: #fffde7; padding: 10px; margin: 10px 0; border-left: 5px solid #fbc02d; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }

        /* Calendar Page */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: white; padding: 10px; border-radius: 8px; }
        .calendar-day { padding: 15px; border: 1px solid #eee; text-align: center; border-radius: 4px; }
        .day-header { font-weight: bold; background: #eee; }
        .today { background: var(--primary); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav>
        <div onclick="showPage('home')">Home</div>
        <div onclick="showPage('notes')">Notes</div>
        <div onclick="showPage('calendar')">Calendar</div>
    </nav>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <div class="home-card">
            <h1>Welcome</h1>
            <p>What would you like to do today?</p>
            <button onclick="showPage('notes')">Go to Notes</button>
            <button onclick="showPage('calendar')">Open Calendar</button>
        </div>
    </div>

    <!-- NOTES PAGE -->
    <div id="notes" class="page">
        <h2>Note Taker</h2>
        <textarea id="note-input" placeholder="Type your note here..."></textarea>
        <button onclick="addNote()" style="padding: 10px 20px; background: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer;">Save Note</button>
        <div id="notes-list"></div>
    </div>

    <!-- CALENDAR PAGE -->
    <div id="calendar" class="page">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">Prev</button>
            <h2 id="month-title">Month Year</h2>
            <button onclick="changeMonth(1)">Next</button>
        </div>
        <div class="calendar-grid" id="calendar-days">
            <!-- Grid will be filled by JS -->
        </div>
    </div>

    <script>
        /* JS: App Logic */

        // 1. NAVIGATION LOGIC
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'calendar') renderCalendar();
        }

        // 2. NOTE TAKER LOGIC
        let notes = JSON.parse(localStorage.getItem('my_notes')) || [];

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            notes.forEach((note, index) => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerHTML = `<span>${note}</span> <button class="delete-btn" onclick="deleteNote(${index})">Delete</button>`;
                list.appendChild(div);
            });
        }

        function addNote() {
            const input = document.getElementById('note-input');
            if (input.value.trim() === '') return;
            notes.push(input.value);
            localStorage.setItem('my_notes', JSON.stringify(notes));
            input.value = '';
            renderNotes();
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            localStorage.setItem('my_notes', JSON.stringify(notes));
            renderNotes();
        }

        // 3. CALENDAR LOGIC
        let currentDate = new Date();

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const title = document.getElementById('month-title');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            title.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentDate);

            // Add day headers (Sun, Mon, etc.)
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                const div = document.createElement('div');
                div.className = 'calendar-day day-header';
                div.innerText = day;
                grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Padding for empty days at start of month
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            // Fill actual days
            for (let i = 1; i <= daysInMonth; i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day';
                if (i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
                    div.classList.add('today');
                }
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        // Initialize
        renderNotes();
    </script>
</body>
</html>
