<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div onclick="showPage('home')">Home</div>
        <div onclick="showPage('notes')">Notes</div>
        <div onclick="showPage('calendar')">Calendar</div>
    </nav>

    <div id="home" class="page active">
        <div class="home-card">
            <h1>Welcome</h1>
            <p>What would you like to do today?</p>
            <button onclick="showPage('notes')">Go to Notes</button>
            <button onclick="showPage('calendar')">Open Calendar</button>
        </div>
    </div>

    <div id="notes" class="page">
        <h2>Note Taker</h2>
        <textarea id="note-input" placeholder="Type your note here..."></textarea>
        <button id="save-note-btn" onclick="addNote()">Save Note</button>
        <div id="notes-list"></div>
    </div>
    <nav>
    <div onclick="showPage('home')">Home</div>
    <div onclick="showPage('notes')">Notes</div>
    <div onclick="showPage('calendar')">Calendar</div>
    <div onclick="showPage('settings')" style="margin-left: auto;">⚙️ Settings</div>
</nav>

<!-- SETTINGS PAGE -->
<div id="settings" class="page">
    <h2>Settings</h2>
    <div class="home-card">
        <p id="user-status">You are not signed in.</p>
        <!-- Google Sign-In Button -->
        <button onclick="login()" id="login-btn" style="background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; width: 100%;">
            <img src="https://wikimedia.org" style="width:18px; margin-right:10px;">
            Sign in with Google
        </button>
        <button onclick="logout()" id="logout-btn" style="display:none; background:#ff5252;">Sign Out</button>
    </div>
</div>


    <div id="calendar" class="page">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">Prev</button>
            <h2 id="month-title">Month Year</h2>
            <button onclick="changeMonth(1)">Next</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
