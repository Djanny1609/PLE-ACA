<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity App</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation */
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        nav div {
            margin: 0 15px;
        }

        nav div:hover {
            text-decoration: underline;
        }

        .settings-nav {
            margin-left: auto;
        }

        /* Page Layout */
        .page {
            display: none;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .active {
            display: block;
        }

        /* Home Page & Auth Styling */
        .home-card {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 50px auto;
        }

        .home-card button, .auth-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }

        .auth-input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* Notes & Calendar Styling */
        #note-input { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; }
        .note-item { background: #fffde7; padding: 10px; margin: 10px 0; border-left: 5px solid #fbc02d; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: white; padding: 10px; border-radius: 8px; }
        .calendar-day { padding: 15px; border: 1px solid #eee; text-align: center; border-radius: 4px; }
        .today { background: var(--primary); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav>
        <div onclick="checkAccess('home')">Home</div>
        <div onclick="checkAccess('notes')">Notes</div>
        <div onclick="checkAccess('calendar')">Calendar</div>
        <div onclick="showPage('settings')" class="settings-nav">⚙️ Account</div>
    </nav>

    <!-- HOME PAGE -->
    <div id="home" class="page">
        <div class="home-card">
            <h1 id="home-welcome">Welcome!</h1>
            <p>What's on the schedule for today?</p>
            <button onclick="showPage('notes')">Go to My Notes</button>
            <button onclick="showPage('calendar')">Open Calendar</button>
        </div>
    </div>

    <!-- NOTES PAGE -->
    <div id="notes" class="page">
        <h2>Private Notes for <span id="notes-user-label">User</span></h2>
        <textarea id="note-input" placeholder="Type a private note here..."></textarea>
        <button onclick="addNote()" class="auth-btn" style="background: #4caf50;">Save Private Note</button>
        <div id="notes-list"></div>
    </div>

    <!-- CALENDAR PAGE -->
    <div id="calendar" class="page">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">Prev</button>
            <h2 id="month-title">Month Year</h2>
            <button onclick="changeMonth(1)">Next</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
    </div>

    <!-- LOGIN / SETTINGS PAGE -->
    <div id="settings" class="page active">
        <div class="home-card">
            <div id="logged-out-view">
                <h2>Sign In / Sign Up</h2>
                <input type="text" id="username" class="auth-input" placeholder="Username">
                <input type="password" id="password" class="auth-input" placeholder="Password">
                <button onclick="handleAuth('login')" class="auth-btn">Log In</button>
                <button onclick="handleAuth('signup')" class="auth-btn" style="background: #4caf50;">Create Account</button>
            </div>
            
            <div id="logged-in-view" style="display:none;">
                <h2 id="welcome-user">Welcome!</h2>
                <p>You are securely logged in.</p>
                <button onclick="logout()" class="auth-btn" style="background: #ff5252;">Log Out</button>
                <hr>
                <h3>Registered Users</h3>
                <ul id="user-list" style="list-style: none; padding: 0; text-align: left; font-size: 0.9rem;"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
