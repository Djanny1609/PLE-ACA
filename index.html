<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalendar</title>
    <link rel="icon" type="image/svg+xml" href="Icono.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
     <!-- NAV BAR -->
<nav>
    <div onclick="checkAccess('home')">Home</div>
    <div onclick="checkAccess('notes')">Notes</div>
    <div onclick="checkAccess('calendar')">Calendar</div>
    <div onclick="checkAccess('events')">Events</div>
    <div onclick="showPage('settings')" class="settings-nav">⚙️ Account</div>
</nav>

    <!-- HOME PAGE -->
    <div id="home" class="page">
        <div class="home-card">
            <h1 id="home-welcome">Welcome!</h1>
            <p>What's on the schedule for today?</p>
            <button onclick="showPage('notes')">Go to My Notes</button>
            <button onclick="showPage('calendar')">Open Calendar</button>
        </div>
    </div>

    <!-- NOTES PAGE -->
    <div id="notes" class="page">
        <h2>Private Notes for <span id="notes-user-label">User</span></h2>
        <textarea id="note-input" placeholder="Type a private note here..."></textarea>
        <button onclick="addNote()" class="auth-btn success">Save Private Note</button>
        <div id="notes-list"></div>
    </div>

    <!-- CALENDAR PAGE -->
    <div id="calendar" class="page">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">Prev</button>
            <h2 id="month-title">Month Year</h2>
            <button onclick="changeMonth(1)">Next</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
    </div>

   
    <!-- LOGIN / SETTINGS PAGE -->
    <div id="settings" class="page active">
        <div class="home-card">
            <div id="logged-out-view">
                <h2>Sign In / Sign Up</h2>
                <input type="text" id="username" class="auth-input" placeholder="Username">
                <input type="password" id="password" class="auth-input" placeholder="Password">
                <button onclick="handleAuth('login')" class="auth-btn">Log In</button>
                <button onclick="handleAuth('signup')" class="auth-btn success">Create Account</button>
            </div>
            
            <div id="logged-in-view">
                <h2 id="welcome-user">Welcome!</h2>
                <p>You are securely logged in.</p>
                <button onclick="logout()" class="auth-btn danger">Log Out</button>
                <hr>
                <h3>Registered Users</h3>
                <ul id="user-list"></ul>
            </div>
        </div>
    </div>

    <!-- EVENTS PAGE -->
    <div id="events" class="page">
        <h2>Upcoming Events</h2>
        <div id="event-controls">
            <input type="text" id="event-name" class="auth-input" placeholder="Event Name">
            <input type="date" id="event-date" class="auth-input">
            <textarea id="event-comment" class="auth-input" placeholder="Add a comment or description..."></textarea>
            <button onclick="addEvent()" class="auth-btn success">Add Event</button>
        </div>
        <div id="events-list"></div>
    </div>

    <!-- EVENT DETAIL MODAL -->
    <div id="event-modal">
        <div class="home-card modal-card">
            <span onclick="closeModal()" class="modal-close">&times;</span>
            <h2 id="modal-title"></h2>
            <p><strong>Date:</strong> <span id="modal-date"></span></p>
            <p><strong>Comment:</strong></p>
            <p id="modal-comment"></p>
        </div>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <p>Loading...</p>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
